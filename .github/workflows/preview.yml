name: Preview (dev -> Pin-preview)

on:
  workflow_dispatch:
  push:
    branches: ["dev"]

jobs:
  build-and-publish-preview:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
      GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
      GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
      GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      BASE_URL: ${{ secrets.BASE_URL }}
      SITE_TITLE: ${{ vars.SITE_TITLE }}
      PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
      PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
      PINTEREST_ENABLE_PUBLISH: ${{ secrets.PINTEREST_ENABLE_PUBLISH }}

    steps:
      - name: Checkout Pin (dev)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt

      - name: Generate site
        run: |
          python -m src.app.run_daily

      - name: Checkout Pin-preview
        uses: actions/checkout@v4
        with:
          repository: rodrigosimoes97/Pin-preview
          token: ${{ secrets.PREVIEW_TOKEN }}
          path: preview-repo

      - name: Replace preview site content
        run: |
          rm -rf preview-repo/*
          cp -R docs/* preview-repo/

      - name: Commit and push preview
        run: |
          cd preview-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update preview from dev" || echo "No changes to commit"
          git push
